services:

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: milan-backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    ports:
      - "8000:8000"
    networks:
      - milan-net
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    container_name: milan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - milan-net
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

networks:
  milan-net:
    driver: bridge